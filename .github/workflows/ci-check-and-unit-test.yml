name: CI - Check & Unit Test

on:
  push:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      - 'dist/**'

  pull_request:

permissions:
  contents: read

# ⚡ Prevent duplicate runs on rapid pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-format-and-unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Start Grafana Alloy
        uses: ./.github/actions/setup-alloy
        with:
          service-name: ci-check-and-unit-test
          grafana-endpoint: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          grafana-auth: ${{ secrets.GRAFANA_CLOUD_AUTH }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sources/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        env:
          # ⚠️ Replace with real checksum in production
          ALLOWED_GRADLE_WRAPPER_CHECKSUMS: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        with:
          gradle-version: '8.14.2'

      - name: Install Develocity npm agent
        if: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY != '' }}
        run: |
          npm exec -y -- pacote extract @gradle-tech/develocity-agent@3.0.1 ~/.node_libraries/@gradle-tech/develocity-agent

      - name: Install npm dependencies
        working-directory: sources
        run: |
          if [ -n "${DEVELOCITY_ACCESS_KEY}" ]; then
            export NODE_OPTIONS='-r @gradle-tech/develocity-agent/preload'
          fi
          npm clean-install
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

      - name: Check formatting and compile
        working-directory: sources
        run: |
          if [ -n "${DEVELOCITY_ACCESS_KEY}" ]; then
            export NODE_OPTIONS='-r @gradle-tech/develocity-agent/preload'
          fi
          npm run check
          npm run compile
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

      - name: Run unit tests
        working-directory: sources
        run: |
          if [ -n "${DEVELOCITY_ACCESS_KEY}" ]; then
            export NODE_OPTIONS='-r @gradle-tech/develocity-agent/preload'
          fi
          npm test
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

      - name: Teardown Grafana Alloy
        if: always()
        uses: ./.github/actions/teardown-alloy
