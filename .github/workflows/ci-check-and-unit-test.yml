name: CI - Check & Unit Test

on:
  push:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      - 'dist/**'

  pull_request:

permissions:
  contents: read

# ⚡ Prevent duplicate runs on rapid pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  GRADLE_VERSION: 8.14.2

jobs:
  check-format-and-unit-test:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Optional Observability
      # ------------------------------------------------------------
      - name: Start Grafana Alloy
        if: env.GRAFANA_ENABLED == 'true'
        uses: ./.github/actions/setup-alloy
        with:
          service-name: ci-check-and-unit-test
          grafana-endpoint: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          grafana-auth: ${{ secrets.GRAFANA_CLOUD_AUTH }}
        env:
          GRAFANA_ENABLED: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT != '' && 'true' || 'false' }}

      # ------------------------------------------------------------
      # Node
      # ------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sources/package-lock.json

      # ------------------------------------------------------------
      # Gradle
      # ------------------------------------------------------------
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

        env:
          # 🔐 Replace with REAL checksum from:
          # sha256sum gradle/wrapper/gradle-wrapper.jar
          ALLOWED_GRADLE_WRAPPER_CHECKSUMS: REPLACE_WITH_REAL_SHA256

      # ------------------------------------------------------------
      # Configure Develocity
      # ------------------------------------------------------------
      - name: Configure Develocity
        shell: bash
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}
        run: |
          if [ -n "${DEVELOCITY_ACCESS_KEY}" ]; then
            echo "DEVELOCITY_ENABLED=true" >> $GITHUB_ENV
            echo "NODE_OPTIONS=-r @gradle-tech/develocity-agent/preload" >> $GITHUB_ENV
          else
            echo "DEVELOCITY_ENABLED=false" >> $GITHUB_ENV
          fi

      # ------------------------------------------------------------
      # Install Develocity Agent
      # ------------------------------------------------------------
      - name: Install Develocity npm agent
        if: env.DEVELOCITY_ENABLED == 'true'
        run: |
          mkdir -p ~/.node_libraries/@gradle-tech

          npm exec -y -- \
            pacote extract \
            @gradle-tech/develocity-agent@3.0.1 \
            ~/.node_libraries/@gradle-tech/develocity-agent

      # ------------------------------------------------------------
      # Install Dependencies
      # ------------------------------------------------------------
      - name: Install npm dependencies
        working-directory: sources
        run: npm clean-install
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

      # ------------------------------------------------------------
      # Lint / Format / Compile
      # ------------------------------------------------------------
      - name: Check formatting
        working-directory: sources
        run: npm run check
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

      - name: Compile project
        working-directory: sources
        run: npm run compile
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

      # ------------------------------------------------------------
      # Unit Tests
      # ------------------------------------------------------------
      - name: Run unit tests
        working-directory: sources
        run: npm test
        env:
          CI: true
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}

      # ------------------------------------------------------------
      # Upload Test Reports
      # ------------------------------------------------------------
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-results
          path: |
            sources/test-results
            sources/coverage
          if-no-files-found: ignore

      # ------------------------------------------------------------
      # Summary
      # ------------------------------------------------------------
      - name: CI Summary
        if: always()
        run: |
          echo "✅ CI pipeline completed"
          echo "Branch: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
