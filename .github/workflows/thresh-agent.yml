name: Thresh Agent

on:
  pull_request:

  push:
    branches:
      - main
      - master

  workflow_run:
    workflows:
      - CI
      - Tests
    types:
      - completed

jobs:
  thresh:
    if: >
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion != 'success'
      )

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Thresh Agent
        uses: ./thresh
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-fixes: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
