name: Fi Autonomous Cherry-Pick Mesh

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  BOT_BRANCH_PREFIX: fi-sync
  AUTOPICK_TAG: "[autopick]"

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      commit_msg: ${{ steps.vars.outputs.commit_msg }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture Commit Metadata
        id: vars
        run: |
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_msg<<EOF" >> "$GITHUB_OUTPUT"
          git log -1 --pretty=%B >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Detect AutoPick Marker
        id: filter
        run: |
          if git log -1 --pretty=%B | grep -iq "\[autopick\]"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  propagate:
    needs: classify
    if: needs.classify.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        repo:
          - your-org/repo-one
          - your-org/repo-two
          - your-org/repo-three

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config --global user.name "FiBot"
          git config --global user.email "actions@github.com"

      - name: Clone Target Repo
        env:
          GH_TOKEN: ${{ secrets.FI_BOT_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ matrix.repo }} target-repo

      - name: Create Sync Branch
        working-directory: target-repo
        run: |
          BRANCH_NAME="${BOT_BRANCH_PREFIX}/$(date +%s)"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH_NAME"

      - name: Add Source Remote
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.FI_BOT_TOKEN }}
        run: |
          git remote add source https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git fetch source main

      - name: Cherry Pick Commit
        working-directory: target-repo
        run: |
          git cherry-pick ${{ needs.classify.outputs.commit_sha }} || {
            echo "Cherry-pick conflict detected."
            git cherry-pick --abort
            exit 1
          }

      - name: Push Sync Branch
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.FI_BOT_TOKEN }}
        run: |
          git push origin "$BRANCH_NAME"

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.FI_BOT_TOKEN }}
          path: target-repo
          branch: ${{ env.BRANCH_NAME }}
          title: |
            🔥 Fi Auto-Propagation:
            ${{ needs.classify.outputs.commit_sha }}
          body: |
            Autonomous cherry-pick propagation initiated.

            Source Repo:
            `${{ github.repository }}`

            Commit:
            `${{ needs.classify.outputs.commit_sha }}`

            Original Message:
            ${{ needs.classify.outputs.commit_msg }}

            ---
            Generated by FiBot Mesh Engine.

  replay-log:
    needs:
      - classify
      - propagate
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Replay Ledger
        run: |
          mkdir -p .dredge

          cat <<EOF >> .dredge/replay-log.jsonl
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commit": "${{ needs.classify.outputs.commit_sha }}",
            "message": ${{
              toJson(needs.classify.outputs.commit_msg)
            }},
            "status": "${{ needs.propagate.result }}"
          }
          EOF

      - name: Commit Replay Ledger
        run: |
          git config --global user.name "FiBot"
          git config --global user.email "actions@github.com"

          git add .dredge/replay-log.jsonl

          git commit -m "chore(dredge): update replay ledger [skip ci]" || exit 0

          git push
